name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
    inputs:
      run_sonar_gate:
        description: Run the SonarCloud open-issues gate before deployment.
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      run_sonar_gate:
        required: false
        default: false
        type: boolean
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      CLOUDFLARE_D1_DATABASE_ID:
        required: true
      SESSION_SECRET:
        required: true
      GOOGLE_CLIENT_ID:
        required: true
      GOOGLE_CLIENT_SECRET:
        required: true
      SONAR_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  sonar:
    if: inputs.run_sonar_gate
    runs-on: ubuntu-latest
    permissions:
      checks: read
      contents: read
    env:
      NODE_OPTIONS: --disable-warning=DEP0040
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Configure Git defaults
        run: git config --global init.defaultBranch main

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.14.0 --activate

      - name: Verify required Sonar secret
        shell: bash
        run: |
          if [ -z "${SONAR_TOKEN}" ]; then
            echo "SONAR_TOKEN is not configured"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Block on SonarCloud open issues
        run: pnpm sonar:open-issues

  deploy:
    needs: sonar
    if: ${{ always() && (!inputs.run_sonar_gate || needs.sonar.result == 'success') }}
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --disable-warning=DEP0040
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
    steps:
      - name: Configure Git defaults
        run: git config --global init.defaultBranch main

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.14.0 --activate

      - name: Verify required production secrets
        shell: bash
        run: |
          required=(
            CLOUDFLARE_API_TOKEN
            CLOUDFLARE_ACCOUNT_ID
            CLOUDFLARE_D1_DATABASE_ID
            SESSION_SECRET
            GOOGLE_CLIENT_ID
            GOOGLE_CLIENT_SECRET
          )

          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "$name is not configured"
              exit 1
            fi
          done

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Worker
        run: pnpm --filter worker build

      - name: Configure production D1 binding
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const wranglerPath = 'apps/worker/wrangler.toml';
          const databaseId = process.env.CLOUDFLARE_D1_DATABASE_ID;

          if (!databaseId) {
            throw new Error('CLOUDFLARE_D1_DATABASE_ID is not configured');
          }

          const original = fs.readFileSync(wranglerPath, 'utf8');
          const updated = original.replace(
            /(\[\[env\.production\.d1_databases\]\][\s\S]*?database_id = ")[^"]*(")/u,
            `$1${databaseId}$2`,
          );

          if (updated === original) {
            throw new Error('Production D1 database_id placeholder was not found');
          }

          fs.writeFileSync(wranglerPath, updated);
          NODE

      - name: Deploy Worker
        run: pnpm --filter worker exec wrangler deploy --env production

      - name: Apply D1 migrations
        run: pnpm --filter worker exec wrangler d1 migrations apply labsplit --remote --env production

      - name: Sync Worker secrets
        shell: bash
        run: |
          for name in SESSION_SECRET GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET; do
            printf '%s' "${!name}" | pnpm --filter worker exec wrangler secret put "$name" --env production
          done
